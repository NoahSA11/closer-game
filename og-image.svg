<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A2F"/>
      <stop offset="40%" style="stop-color:#2C4A3E"/>
      <stop offset="100%" style="stop-color:#3D2A2A"/>
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,400&amp;family=DM+Sans:wght@400;500&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle decorative circles -->
  <circle cx="100" cy="100" r="200" fill="white" opacity="0.03"/>
  <circle cx="1100" cy="530" r="250" fill="white" opacity="0.03"/>
  <circle cx="1050" cy="80" r="120" fill="#C4756A" opacity="0.06"/>

  <!-- Floating hearts -->
  <text x="80" y="180" font-size="48" fill="white" opacity="0.08">♡</text>
  <text x="1080" y="200" font-size="64" fill="white" opacity="0.06">♡</text>
  <text x="980" y="480" font-size="32" fill="white" opacity="0.07">◇</text>
  <text x="160" y="520" font-size="28" fill="white" opacity="0.06">♡</text>

  <!-- Logo mark -->
  <circle cx="175" cy="88" r="26" fill="#1E3A2F" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <path d="M175 98c-6-6-11-10-11-14a5.3 5.3 0 0 1 5.3-5.2c1.3 0 4.2.5 5.7 4.5 1.6-4 4.5-4.5 5.8-4.5A5.3 5.3 0 0 1 186 83.9c0 4.1-5.1 8.7-11 14.1z" fill="white"/>

  <!-- Closer wordmark -->
  <text x="212" y="100" font-family="Georgia, serif" font-size="36" font-weight="500" fill="white" letter-spacing="2">Closer</text>

  <!-- Main headline -->
  <text x="600" y="268" font-family="Georgia, serif" font-size="72" font-weight="500" fill="white" text-anchor="middle">How well do you</text>
  <text x="600" y="352" font-family="Georgia, serif" font-size="72" font-style="italic" fill="#BF9447" text-anchor="middle">really know each other?</text>

  <!-- Compat ring -->
  <circle cx="600" cy="490" r="54" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <circle cx="600" cy="490" r="54" fill="rgba(255,255,255,0.04)"/>
  <text x="600" y="498" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#BF9447" text-anchor="middle">%</text>
  <text x="600" y="516" font-family="'DM Sans', sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="1">MATCH RATE</text>

  <!-- Tag line -->
  <text x="600" y="420" font-family="'DM Sans', sans-serif" font-size="20" fill="rgba(255,255,255,0.4)" text-anchor="middle" letter-spacing="0.5">Answer questions · Guess each other · Reveal · Repeat</text>

  <!-- URL pill -->
  <rect x="480" y="588" width="240" height="28" rx="14" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="600" y="607" font-family="'DM Sans', sans-serif" font-size="13" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="0.3">closergame.netlify.app</text>
</svg>
